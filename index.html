<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manu Borba - Landing Page</title>
</head>
<body>
    <header>
        <h1>Bem-vindo à Landing Page de Manu Borba</h1>
        <p>Entre em contato comigo!</p>
    </header>
    
    <section id="contato">
        <h2>Contato</h2>
        <form>
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone"><br><br>
            
            <label for="whatsapp">WhatsApp:</label>
            <input type="text" id="whatsapp" name="whatsapp" placeholder="Digite seu WhatsApp"><br><br>
            
            <label for="github">GitHub:</label>
            <a href="https://github.com/manoelaluz-source" target="_blank">Visite meu GitHub</a>
        </form>
    </section>
</body>
</html>
